<!DOCTYPE html>
<html>
<head>
<title>API Fetch Example</title>
</head>
<body>
<h2>Fetch Data from API</h2>
<h3>Sakthi Sundaram R</h3>
<h3>Shreyas Kanagaraj</h3>
<button onclick="getData()">Get Users</button>
<ul id="output"></ul>
<script>
function getData() {
    fetch("https://jsonplaceholder.typicode.com/users")
    .then(response => response.json())
    .then(data => {
        let result = "";
        data.forEach(user => {
            result += "<li>" + user.name + "</li>";
        });
        document.getElementById("output").innerHTML = result;
    })
    .catch(error => {
        console.log("Error:", error);
    });
}
</script>
</body>
</html>
